<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Plywood Orders</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

</head>

<body>

<h2>Plywood Orders</h2>

<table>

<thead>
<tr>

<th>Ngày đặt</th>
<th>Ngày giao</th>
<th>Nhà cung cấp</th>
<th>Số lượng</th>
<th>Loại ván</th>
<th>1F/2F</th>
<th>Logo</th>
<th>EXW</th>
<th>Total EXW</th>
<th>Logistics</th>
<th>Sell price</th>
<th>Sell amount</th>
<th>Profit</th>

</tr>
</thead>

<tbody id="tbody">

<tr>

<td><input type="date"></td>

<td><input type="date"></td>

<td>

<select class="supplierSelect">

<option value="">--Chọn--</option>

<option>Cường Vỹ</option>
<option>Phúc Tiến</option>
<option>Quang Tuệ</option>
<option>Việt Long</option>
<option>Hải Hoài</option>
<option>Hồng Ngọc</option>
<option>Vân Long</option>
<option>Phú Hưng</option>
<option>Thập Hùng</option>

<option value="custom">Tự nhập</option>

</select>

<input class="supplierInput" placeholder="Nhập nhà cung cấp">

</td>

<td><input class="number qty"></td>

<td><input></td>

<td>
<select>
<option>1F</option>
<option>2F</option>
</select>
</td>

<td>
<select>
<option>VNPL</option>
<option>PhuCau</option>
<option>Trơn</option>
</select>
</td>

<td><input class="number exw"></td>

<td class="totalExw">0</td>

<td><input class="number logistics"></td>

<td><input class="number sell"></td>

<td class="sellAmount">0</td>

<td class="profit">0</td>

</tr>

</tbody>

</table>

<button onclick="addRow()">+ Add Order</button>

<script src="app.js"></script>

</body>
</html>
